# ghost-web — Ghost Admin UI + API (ghost.exora.solutions)
# Static files: admin-ui | API proxy: admin-api :6660

server {
    listen 80;
    server_name ghost.exora.solutions;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ghost.exora.solutions;

    ssl_certificate /etc/letsencrypt/live/ghost.exora.solutions/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghost.exora.solutions/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/ghost/ghost_main/admin/admin-ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:6660;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ghost_web_access.log;
    error_log /var/log/nginx/ghost_web_error.log;
}
