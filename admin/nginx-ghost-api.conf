# ghost-api — Scribe API (api.ghost.exora.solutions)
# Proxies to ghost-api (scribe-api) on port 8083
# Run: sudo certbot --nginx -d api.ghost.exora.solutions  (adds HTTPS)

server {
    listen 80;
    server_name api.ghost.exora.solutions;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE and long-lived connections (chat, gateway WebSocket)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    access_log /var/log/nginx/ghost_api_access.log;
    error_log /var/log/nginx/ghost_api_error.log;
}
