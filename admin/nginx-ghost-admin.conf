# Nginx config for ghost.exora.solutions
# Copy to /etc/nginx/sites-available/ghost-admin
# Edit paths: root, ssl_certificate, ssl_certificate_key

server {
    listen 80;
    server_name ghost.exora.solutions;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ghost.exora.solutions;

    ssl_certificate /etc/letsencrypt/live/ghost.exora.solutions/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ghost.exora.solutions/privkey.pem;

    root /var/www/ghost-admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:6660;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
